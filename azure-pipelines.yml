trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  buildConfig: 'Release'
  artifactName: 'production-drop'

steps:
- checkout: self

- task: UseNode@1
  inputs:
    versionSpec: '$(nodeVersion)'
  displayName: 'Install Node.js $(nodeVersion)'

- script: |
    npm config set cache $(Pipeline.Workspace)/.npm --global
  displayName: 'Configure npm cache'

- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: $(Pipeline.Workspace)/.npm
  displayName: 'Restore npm cache'

- script: |
    if [ -f package-lock.json ]; then
      echo "Using npm ci (lockfile found)"
      npm ci --prefer-offline --no-audit --loglevel verbose
    else
      echo "package-lock.json not found; falling back to npm install"
      npm install --no-audit --loglevel verbose
    fi
  displayName: 'Install Dependencies'

- script: |
    npm run build --if-present
  displayName: 'Build Application in $(buildConfig) Mode'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)'
    Contents: |
      dist/**
      build/**
      package.json
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
  displayName: 'Stage Files for Artifact'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: '$(artifactName)'
    publishLocation: 'Container'
  displayName: 'Publish Artifact: $(artifactName)'