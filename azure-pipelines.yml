trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# 1. Pipeline-Specific Variables Declared Globally
variables:
  nodeVersion: '20.x'
  buildConfig: 'Release'
  artifactName: 'production-drop'
  # You can also reference Variable Groups here (uncomment the line below if using Part 2)
  # - group: 'project-global-settings'

steps:
# Use the defined variable using the $(variableName) syntax
- task: UseNode@1
  inputs:
    versionSpec: '$(nodeVersion)'
  displayName: 'Install Node.js $(nodeVersion)'

- script: |
  set -x
  node --version
  npm --version
  ls -la
  if [ -f package.json ]; then echo "package.json present"; else echo "package.json missing"; fi
  if [ -f package-lock.json ]; then echo "package-lock.json present"; else echo "package-lock.json missing"; fi
  npm cache verify || npm cache clean --force
  npm ci --loglevel verbose
  displayName: 'Install Dependencies'

- script: |
    npm run build --if-present
  displayName: 'Build Application in $(buildConfig) Mode'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)'
    Contents: |
      dist/**
      build/**
      package.json
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
  displayName: 'Stage Files for Artifact'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: '$(artifactName)'
    publishLocation: 'Container'
  displayName: 'Publish Artifact: $(artifactName)'